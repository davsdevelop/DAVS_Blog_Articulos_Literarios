{% extends 'pages/base.html' %}

{% block content %}
    <h2>Iniciar Sesión</h2>
    <p>Ingresa tus credenciales para acceder a tu cuenta.</p>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Entrar</button>
    </form>
    
    <p style="margin-top: 20px;">¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a>.</p>
{% endblock %}
