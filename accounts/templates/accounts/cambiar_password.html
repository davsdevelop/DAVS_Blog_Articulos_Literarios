{% extends 'pages/base.html' %}

{% block content %}
    <h2>Cambiar Contraseña</h2>
    <p>Por favor, ingresa tu contraseña antigua por seguridad, y luego tu nueva contraseña dos veces para confirmarla.</p>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Cambiar Contraseña</button>
        <a href="{% url 'perfil' %}" class="btn btn-danger" style="text-decoration: none;">Cancelar</a>
    </form>
{% endblock %}
