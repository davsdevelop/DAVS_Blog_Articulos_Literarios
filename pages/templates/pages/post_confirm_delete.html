{% extends 'pages/base.html' %}

{% block content %}
    <h2>Confirmar Eliminación</h2>
    <p>¿Estás seguro de que deseas borrar la página: <strong>"{{ post.titulo }}"</strong>?</p>
    
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, borrar</button>
        <a href="{% url 'post_list' %}" class="btn">Cancelar</a>
    </form>
{% endblock %}
